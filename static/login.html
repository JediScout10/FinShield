<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinShield | Sign In</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Public+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Public Sans', sans-serif; background-color: #E6ECF2; color: #2b3437; }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md">

  <!-- Header -->
  <div class="text-center mb-10">
    <h1 class="text-3xl font-extrabold tracking-tighter text-[#2b3437] font-['Manrope']">FinShield</h1>
    <p class="text-sm font-semibold uppercase tracking-widest text-[#4C6EF5] mt-1">Fraud Detection ML System</p>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">

    <!-- Tabs -->
    <div class="flex border-b border-gray-200 mb-8">
      <button id="tabLogin"
        onclick="showTab('login')"
        class="flex-1 pb-3 text-sm font-bold uppercase tracking-widest border-b-2 border-[#4C6EF5] text-[#4C6EF5] transition-colors">
        Sign In
      </button>
      <button id="tabRegister"
        onclick="showTab('register')"
        class="flex-1 pb-3 text-sm font-bold uppercase tracking-widest border-b-2 border-transparent text-gray-400 transition-colors">
        Register
      </button>
    </div>

    <!-- Error / Success message -->
    <div id="msgBox" class="hidden mb-6 px-4 py-3 rounded-lg text-sm font-semibold"></div>

    <!-- LOGIN FORM -->
    <div id="formLogin">
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Email</label>
          <input id="loginEmail" type="email" placeholder="you@example.com"
            class="w-full bg-[#EDF2F7] border-none rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4C6EF5]"/>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Password</label>
          <input id="loginPassword" type="password" placeholder="••••••••"
            class="w-full bg-[#EDF2F7] border-none rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4C6EF5]"/>
        </div>
        <button onclick="doLogin()"
          class="w-full py-3 bg-[#4C6EF5] text-white font-bold rounded-lg text-sm uppercase tracking-widest hover:bg-[#3B5BDB] active:scale-[0.98] transition-all mt-2">
          Sign In
        </button>
      </div>
    </div>

    <!-- REGISTER FORM -->
    <div id="formRegister" class="hidden">
      <div class="space-y-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Email</label>
          <input id="regEmail" type="email" placeholder="you@example.com"
            class="w-full bg-[#EDF2F7] border-none rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4C6EF5]"/>
        </div>
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Password</label>
          <input id="regPassword" type="password" placeholder="Min. 6 characters"
            class="w-full bg-[#EDF2F7] border-none rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#4C6EF5]"/>
        </div>
        <button onclick="doRegister()"
          class="w-full py-3 bg-[#4C6EF5] text-white font-bold rounded-lg text-sm uppercase tracking-widest hover:bg-[#3B5BDB] active:scale-[0.98] transition-all mt-2">
          Create Account
        </button>
      </div>
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// FIREBASE CONFIG — replace all YOUR_* values with your actual
// Firebase project credentials from Firebase Console →
// Project Settings → Your apps → Web app → Config
// ══════════════════════════════════════════════════════════════
const firebaseConfig = {
    apiKey:            "YOUR_API_KEY",
    authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
    projectId:         "YOUR_PROJECT_ID",
    storageBucket:     "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId:             "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ── Tab switching ──
function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('formLogin').classList.toggle('hidden', !isLogin);
    document.getElementById('formRegister').classList.toggle('hidden', isLogin);
    document.getElementById('tabLogin').classList.toggle('border-[#4C6EF5]', isLogin);
    document.getElementById('tabLogin').classList.toggle('text-[#4C6EF5]', isLogin);
    document.getElementById('tabLogin').classList.toggle('border-transparent', !isLogin);
    document.getElementById('tabLogin').classList.toggle('text-gray-400', !isLogin);
    document.getElementById('tabRegister').classList.toggle('border-[#4C6EF5]', !isLogin);
    document.getElementById('tabRegister').classList.toggle('text-[#4C6EF5]', !isLogin);
    document.getElementById('tabRegister').classList.toggle('border-transparent', isLogin);
    document.getElementById('tabRegister').classList.toggle('text-gray-400', isLogin);
    hideMsg();
}

function showMsg(text, isError) {
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = `mb-6 px-4 py-3 rounded-lg text-sm font-semibold ${
        isError ? 'bg-red-50 text-red-700 border border-red-200'
                : 'bg-green-50 text-green-700 border border-green-200'
    }`;
    box.classList.remove('hidden');
}
function hideMsg() {
    document.getElementById('msgBox').classList.add('hidden');
}

// ══════════════════════════════════════════════════════════════
// LOGIN
// Flow: Firebase Auth → get UID → call /login-success (resets
// failed_attempts in Firestore) → store UID+email in
// sessionStorage → redirect to /app
// ══════════════════════════════════════════════════════════════
async function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
        showMsg('Please enter email and password.', true);
        return;
    }

    try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const uid  = cred.user.uid;

        // Reset failed_attempts in Firestore on successful login
        await fetch('/login-success', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid, email })
        });

        // Store UID in sessionStorage — index.html reads this as payment user_id
        sessionStorage.setItem('fs_uid',   uid);
        sessionStorage.setItem('fs_email', email);

        window.location.replace('/app');

    } catch (err) {
        // Increment failed_attempts counter in Firestore
        await fetch('/login-failed', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        }).catch(() => {}); // non-blocking — don't let this crash the error display

        // Show human-readable Firebase error
        let msg = 'Login failed. Please check your credentials.';
        if (err.code === 'auth/user-not-found')   msg = 'No account found with this email.';
        if (err.code === 'auth/wrong-password')   msg = 'Incorrect password. Please try again.';
        if (err.code === 'auth/invalid-email')    msg = 'Invalid email address format.';
        if (err.code === 'auth/too-many-requests') msg = 'Too many failed attempts. Try again later.';
        if (err.code === 'auth/api-key-not-valid') msg = 'Firebase not configured. Update firebaseConfig in login.html.';
        showMsg(msg, true);
    }
}

// ══════════════════════════════════════════════════════════════
// REGISTER
// Flow: Firebase Auth createUser → call /register-user to create
// Firestore document keyed by UID → store in sessionStorage →
// redirect to /app
// ══════════════════════════════════════════════════════════════
async function doRegister() {
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!email || !password) {
        showMsg('Please enter email and password.', true);
        return;
    }
    if (password.length < 6) {
        showMsg('Password must be at least 6 characters.', true);
        return;
    }

    try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        const uid  = cred.user.uid;

        // Create Firestore user document
        const resp = await fetch('/register-user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid, email })
        });

        if (!resp.ok) throw new Error('Firestore registration failed');

        // Store session and redirect
        sessionStorage.setItem('fs_uid',   uid);
        sessionStorage.setItem('fs_email', email);

        window.location.replace('/app');

    } catch (err) {
        let msg = 'Registration failed.';
        if (err.code === 'auth/email-already-in-use') msg = 'An account with this email already exists.';
        if (err.code === 'auth/weak-password')        msg = 'Password is too weak.';
        if (err.code === 'auth/invalid-email')        msg = 'Invalid email address format.';
        if (err.code === 'auth/api-key-not-valid')    msg = 'Firebase not configured. Update firebaseConfig in login.html.';
        showMsg(msg, true);
    }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
        const loginVisible = !document.getElementById('formLogin').classList.contains('hidden');
        if (loginVisible) doLogin(); else doRegister();
    }
});
</script>

</body>
</html>
