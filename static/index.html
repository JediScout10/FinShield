<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FinShield Fraud Detection</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
overflow-y:auto;
color:white;
}

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.video-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
z-index:-1;
}

.card{

width:460px;

margin:auto;

margin-top:40px;

padding:30px;

background:rgba(255,255,255,0.96);

color:black;

border-radius:15px;

box-shadow:0 10px 35px rgba(0,0,0,0.6);

max-height:85vh;

overflow-y:auto;

}

.title{

text-align:center;

font-size:30px;

font-weight:bold;

margin-bottom:20px;

}

.tabs{

display:flex;

margin-bottom:20px;

}

.tabs button{

flex:1;

padding:12px;

border:none;

cursor:pointer;

font-size:16px;

}

.active{

background:#10b981;

color:white;

}

.inactive{

background:#e5e7eb;

}

input{

width:100%;

padding:12px;

margin-bottom:15px;

border-radius:8px;

border:1px solid #ccc;

font-size:15px;

}

button.main{

width:100%;

padding:13px;

background:#10b981;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

font-size:16px;

}

button.main:hover{

background:#059669;

}

#paymentScreen{

display:none;

}

.result{

margin-top:15px;

padding:18px;

border-radius:10px;

word-wrap:break-word;

}

.good{

background:#d1fae5;

color:#065f46;

}

.bad{

background:#fee2e2;

color:#991b1b;

}

.riskBar{

width:100%;

height:20px;

background:#e5e7eb;

border-radius:10px;

margin-top:10px;

}

.riskFill{

height:100%;

border-radius:10px;

transition:0.5s;

}

.sectionTitle{

margin-top:15px;

font-weight:bold;

font-size:18px;

}

ul{

margin-top:5px;

word-break:break-word;

overflow-wrap:break-word;

}

.badge{

padding:6px 12px;

border-radius:6px;

color:white;

font-weight:bold;

display:inline-block;

margin-top:8px;

}

.low{

background:#10b981;

}

.medium{

background:#f59e0b;

}

.high{

background:#ef4444;

}

</style>

</head>

<body>

<video class="bg-video" autoplay muted loop>
<source src="/static/hero-bg.mp4" type="video/mp4">
</video>

<div class="video-overlay"></div>


<div id="authScreen" class="card">

<div class="title">
FinShield Security
</div>

<div class="tabs">

<button id="loginBtn" class="active" onclick="showLogin()">Login</button>

<button id="registerBtn" class="inactive" onclick="showRegister()">Register</button>

</div>


<div id="loginForm">

<input id="loginEmail" placeholder="Email">

<input id="loginPassword" type="password" placeholder="Password">

<button class="main" onclick="login()">Login</button>

</div>


<div id="registerForm" style="display:none;">

<input id="registerEmail" placeholder="Email">

<input id="registerPassword" type="password" placeholder="Password">

<button class="main" onclick="register()">Register</button>

</div>

<div id="authMessage"></div>

</div>



<div id="paymentScreen" class="card">

<div class="title">
Fraud Detection Payment
</div>

<input id="amount" type="number" value="100">

<button class="main" onclick="processPayment()">
Analyse Transaction
</button>

<button class="main"
style="margin-top:10px;background:#3b82f6"
onclick="logout()">

Logout

</button>

<div id="paymentResult"></div>

</div>


<script>

const firebaseConfig={

 apiKey: "AIzaSyCRTxdDF195fHkQY0uuUilJr_SBGxd8mas",
  authDomain: "finshield-82819.firebaseapp.com",
  projectId: "finshield-82819",
  storageBucket: "finshield-82819.firebasestorage.app",
  messagingSenderId: "666957378242",
  appId: "1:666957378242:web:1a55e56e9dacae8cac815b"

};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();

let currentUser=null;


function showLogin(){

loginForm.style.display="block";

registerForm.style.display="none";

loginBtn.className="active";

registerBtn.className="inactive";

}

function showRegister(){

registerForm.style.display="block";

loginForm.style.display="none";

registerBtn.className="active";

loginBtn.className="inactive";

}


async function register(){

const email=registerEmail.value;

const password=registerPassword.value;

try{

const user=await auth.createUserWithEmailAndPassword(email,password);

await fetch("/register-user",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

uid:user.user.uid,

email:user.user.email

})

});

authMessage.innerHTML="Registered successfully";

showLogin();

}

catch(e){

authMessage.innerHTML=e.message;

}

}


async function login(){

const email=loginEmail.value;

const password=loginPassword.value;

try{

const user=await auth.signInWithEmailAndPassword(email,password);

currentUser=user.user;

authScreen.style.display="none";

paymentScreen.style.display="block";

}

catch(e){

authMessage.innerHTML=e.message;

}

}


function logout(){

auth.signOut();

paymentScreen.style.display="none";

authScreen.style.display="block";

}



async function processPayment(){

const amt=parseFloat(document.getElementById("amount").value);

const device=navigator.platform+" | "+navigator.userAgent.split(" ")[0];

const response=await fetch("/payment",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

user_id:currentUser.uid,

amount:amt,

device_fingerprint:device

})

});

const result=await response.json();


let riskList="";

result.risk_factors.forEach(r=>{
riskList+="<li>"+r+"</li>";
});

let safeList="";

result.safe_factors.forEach(s=>{
safeList+="<li>"+s+"</li>";
});


let evidence="";

for(let key in result.detected_data){

evidence+="<li><b>"+key+" :</b> "+result.detected_data[key]+"</li>";

}


let color="#10b981";

let severity="LOW";

let severityClass="low";

if(result.risk_score>40){

color="#ef4444";

severity="HIGH";

severityClass="high";

}
else if(result.risk_score>20){

color="#f59e0b";

severity="MEDIUM";

severityClass="medium";

}


paymentResult.innerHTML=

'<div class="result '+(result.allowed?'good':'bad')+'">'+

'<h3>Prediction : '+result.prediction+'</h3>'+

'<b>Risk Score :</b> '+result.risk_score+'%'+

'<div class="riskBar">'+
'<div class="riskFill" style="width:'+result.risk_score+'%;background:'+color+';"></div>'+
'</div>'+

'<div class="badge '+severityClass+'">'+severity+' RISK</div>'+

'<div class="sectionTitle">Transaction Evidence</div>'+

'<ul>'+evidence+'</ul>'+

'<div class="sectionTitle">Risk Factors</div>'+

'<ul>'+riskList+'</ul>'+

'<div class="sectionTitle">Safe Factors</div>'+

'<ul>'+safeList+'</ul>'+

'</div>';

}

</script>

</body>

</html>
